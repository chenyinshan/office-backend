server:
  port: 8083
spring:
  application:
    name: oa-workflow-service
  datasource:
    url: jdbc:mysql://localhost:3306/oa?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# MinIO（附件存储），本地可用 docker run -p 9000:9000 -p 9001:9001 minio/minio server /data --console-address ":9001"
app:
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: oa-attachments

# Dubbo：使用 Nacos 作为注册中心，后续可在 com.example.oa.workflow.dubbo 下暴露 Dubbo 服务
dubbo:
  application:
    name: ${spring.application.name}
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://${NACOS_SERVER_ADDR:localhost:8848}
  scan:
    base-packages: com.example.oa.workflow.dubbo
