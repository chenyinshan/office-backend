# 本地/测试环境中间件一键启动
# 与 docs/backend-stack-summary.md 第十节对应
# 使用：在项目根目录执行 docker compose -f deploy/docker-compose.yml up -d

name: backend-middleware

services:
  mysql:
    image: mysql:8.0
    container_name: middleware-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - middleware

  redis:
    image: redis:7-alpine
    container_name: middleware-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - middleware

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: middleware-nacos
    profiles:
      - nacos   # 默认 up 不启动；需用时：docker compose --profile nacos up -d
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      # 使用外部 MySQL 作为 Nacos 数据源（对应下方 mysql 服务），库名建议为 nacos
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      # 开发环境先关闭鉴权，避免额外配置；需要鉴权时再开启并配置 identity
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    networks:
      - middleware

  

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: middleware-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - middleware

volumes:
  mysql_data:
  redis_data:
  rocketmq_namesrv_logs:
  rocketmq_namesrv_store:
  rocketmq_broker_logs:
  rocketmq_broker_store:
  es_data:
  prometheus_data:
  grafana_data:
  minio_data:

networks:
  middleware:
    driver: bridge
